services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: brainshare-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  # Relational store for users / collections / dirs / files / sharing.
  # Point the backend at it with:
  #   DATABASE_URL=postgresql+asyncpg://brainshare:brainshare@localhost:5432/brainshare
  postgres:
    image: postgres:17
    container_name: brainshare-pg
    environment:
      POSTGRES_USER: brainshare
      POSTGRES_PASSWORD: brainshare
      POSTGRES_DB: brainshare
    ports:
      - "5432:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    restart: unless-stopped
